<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LinguaStream</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="brand-header">
        <img class="brand-icon" src="../assets/icons/linguastream-icon-48.png" alt="">
        <div class="brand-copy">
          <h1 class="brand-wordmark">LinguaStream</h1>
        </div>
      </header>

      <nav class="tabs" role="tablist" aria-label="Settings tabs">
        <button class="tab is-active" type="button" role="tab" aria-selected="true" aria-controls="tab-basic" data-tab="basic">Basic</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="tab-voice" data-tab="voice">Voice</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="tab-recognition" data-tab="recognition">ASR</button>
        <button class="tab" type="button" role="tab" aria-selected="false" aria-controls="tab-translation" data-tab="translation">Translate</button>
      </nav>

      <div class="panel-stage">
        <section id="tab-basic" class="tab-panel is-active" role="tabpanel" data-tab-panel="basic">
          <section class="section">
            <label class="field" id="asrEndpointField">
              <span>Backend URL <b id="asrBaseUrlRequired" class="required">*</b></span>
              <input id="asrEndpoint" type="url" placeholder="http://127.0.0.1:8787">
            </label>

            <label class="field">
              <span>Target Language <b class="required">*</b></span>
              <select id="targetLanguage">
                <option value="zh-CN">Chinese (Simplified)</option>
                <option value="zh-TW">Chinese (Traditional)</option>
                <option value="ja-JP">Japanese</option>
                <option value="ko-KR">Korean</option>
                <option value="en-US">English</option>
              </select>
            </label>
          </section>
        </section>

        <section id="tab-voice" class="tab-panel" role="tabpanel" data-tab-panel="voice" hidden>
          <section class="section">
            <label class="field">
              <span>Voice Provider <b class="required">*</b></span>
              <select id="ttsProvider">
                <option value="browser">Browser</option>
                <option value="custom">Custom</option>
              </select>
            </label>

            <label class="field" id="ttsBaseUrlField">
              <span>BaseURL <b class="required">*</b></span>
              <input id="ttsBaseUrl" type="url" placeholder="https://example.com">
            </label>

            <label class="field" id="ttsApiKeyField">
              <span>API Key</span>
              <div class="password-shell">
                <input id="ttsApiKey" type="password" placeholder="sk-...">
                <button class="password-toggle" type="button" data-password-toggle="ttsApiKey" aria-label="Show API Key" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path class="eye-open" d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                    <path class="eye-open" d="M12 9.2a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6Z"></path>
                    <path class="eye-closed" d="M3.5 5.5 20.5 18.5"></path>
                    <path class="eye-closed" d="M10.7 10.4a2.8 2.8 0 0 0 3.5 3.5"></path>
                  </svg>
                </button>
              </div>
            </label>

            <label class="field" id="ttsModelField">
              <span>Model</span>
              <input id="ttsModel" type="text" placeholder="tts-1">
            </label>

            <label class="field" id="ttsVoiceField">
              <span>Voice</span>
              <select id="ttsVoice"></select>
            </label>

            <label class="field">
              <span>Voice Volume</span>
              <div class="range-row">
                <input id="ttsVolume" type="range" min="0" max="100" step="5">
                <output id="ttsVolumeValue">100%</output>
              </div>
            </label>

            <label class="field">
              <span>Original Volume</span>
              <div class="range-row">
                <input id="duckVolumeLevel" type="range" min="0" max="100" step="5">
                <output id="duckVolumeValue">25%</output>
              </div>
            </label>
          </section>
        </section>

        <section id="tab-recognition" class="tab-panel" role="tabpanel" data-tab-panel="recognition" hidden>
          <section class="section">
            <label class="field">
              <span>Provider <b class="required">*</b></span>
              <select id="asrProvider">
                <option value="custom">Custom</option>
                <option value="volcengine">Volcengine</option>
              </select>
            </label>

            <label class="field" id="asrCustomBaseUrlField">
              <span>BaseURL <b class="required">*</b></span>
              <input id="asrCustomBaseUrl" type="url" placeholder="http://127.0.0.1:8787">
            </label>

            <label class="field" id="asrCustomApiKeyField">
              <span>API Key</span>
              <div class="password-shell">
                <input id="asrCustomApiKey" type="password" placeholder="API Key">
                <button class="password-toggle" type="button" data-password-toggle="asrCustomApiKey" aria-label="Show API Key" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path class="eye-open" d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                    <path class="eye-open" d="M12 9.2a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6Z"></path>
                    <path class="eye-closed" d="M3.5 5.5 20.5 18.5"></path>
                    <path class="eye-closed" d="M10.7 10.4a2.8 2.8 0 0 0 3.5 3.5"></path>
                  </svg>
                </button>
              </div>
            </label>

            <label class="field" id="asrVolcengineModeField" hidden>
              <span>Mode <b class="required">*</b></span>
              <select id="asrVolcengineMode">
                <option value="turbo">Flash / Turbo</option>
              </select>
            </label>

            <label class="field" id="asrVolcengineAppIdField" hidden>
              <span>APP ID <b class="required">*</b></span>
              <input id="asrVolcengineAppId" type="text" placeholder="APP ID">
            </label>

            <label class="field" id="asrVolcengineAccessTokenField" hidden>
              <span>Access Token <b class="required">*</b></span>
              <div class="password-shell">
                <input id="asrVolcengineAccessToken" type="password" placeholder="Access Token">
                <button class="password-toggle" type="button" data-password-toggle="asrVolcengineAccessToken" aria-label="Show Access Token" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path class="eye-open" d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                    <path class="eye-open" d="M12 9.2a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6Z"></path>
                    <path class="eye-closed" d="M3.5 5.5 20.5 18.5"></path>
                    <path class="eye-closed" d="M10.7 10.4a2.8 2.8 0 0 0 3.5 3.5"></path>
                  </svg>
                </button>
              </div>
            </label>

            <label class="field" id="asrModelField">
              <span>Model</span>
              <input id="asrModel" type="text" placeholder="Default tiny.en">
            </label>
          </section>
        </section>

        <section id="tab-translation" class="tab-panel" role="tabpanel" data-tab-panel="translation" hidden>
          <section class="section">
            <label class="field">
              <span>Provider <b class="required">*</b></span>
              <select id="translatorType">
                <option value="publicGoogle">Google</option>
                <option value="deepseek">DeepSeek</option>
                <option value="api">Custom</option>
              </select>
            </label>

            <label class="field" id="apiEndpointField">
              <span>BaseURL <b class="required">*</b></span>
              <input id="apiEndpoint" type="url" placeholder="https://example.com/translate">
            </label>

            <label class="field" id="apiKeyField">
              <span>API Key</span>
              <div class="password-shell">
                <input id="apiKey" type="password" placeholder="sk-...">
                <button class="password-toggle" type="button" data-password-toggle="apiKey" aria-label="Show API Key" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path class="eye-open" d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                    <path class="eye-open" d="M12 9.2a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6Z"></path>
                    <path class="eye-closed" d="M3.5 5.5 20.5 18.5"></path>
                    <path class="eye-closed" d="M10.7 10.4a2.8 2.8 0 0 0 3.5 3.5"></path>
                  </svg>
                </button>
              </div>
            </label>

            <label class="field" id="deepSeekApiKeyField" hidden>
              <span>API Key <b class="required">*</b></span>
              <div class="password-shell">
                <input id="deepSeekApiKey" type="password" placeholder="sk-...">
                <button class="password-toggle" type="button" data-password-toggle="deepSeekApiKey" aria-label="Show API Key" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path class="eye-open" d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path>
                    <path class="eye-open" d="M12 9.2a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6Z"></path>
                    <path class="eye-closed" d="M3.5 5.5 20.5 18.5"></path>
                    <path class="eye-closed" d="M10.7 10.4a2.8 2.8 0 0 0 3.5 3.5"></path>
                  </svg>
                </button>
              </div>
            </label>

            <label class="field" id="deepSeekModelField" hidden>
              <span>Model <b class="required">*</b></span>
              <select id="deepSeekModel">
                <option value="deepseek-chat">deepseek-chat</option>
                <option value="deepseek-reasoner">deepseek-reasoner</option>
              </select>
            </label>
          </section>
        </section>
      </div>

      <p id="status" class="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
